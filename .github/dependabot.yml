version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      all-minor-patch:
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
    groups:
      all-minor-patch:
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      all-minor-patch:
        patterns: ["*"]
        update-types: [minor, patch]
